benchmark:
  name: lcb
  # LCB grades via lcb_runner test execution; LCBSpec rejects judge via
  # extra: forbid. No judge block, by design.
method:
  name: tts-agent
  orchestrator_prompt: single
  orchestrator:
    backend: vllm
    model: gemma4-26b-a4b-it
    vllm_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 64
      enable_thinking: true
      max_tokens: 20000
  explore:
    - label: default
      model:
        backend: vllm
        model: gemma4-26b-a4b-it
      cache_dir: ../analysis/cache/lcb/gemma4_26b_a4b_it
      num_explores: 8
num_workers: 128
seed: 42
log_dir: ../analysis/run/lcb/gemma4_26b_a4b_it_gemma_exp_orch
