benchmark:
  name: lcb
method:
  name: tts-agent
  orchestrator_prompt: single
  orchestrator:
    backend: vllm
    model: qwen36-35b-a3b-fp8
    vllm_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      min_p: 0.0
      presence_penalty: 1.5
      repetition_penalty: 1.0
      enable_thinking: true
    # max_tokens=20000: orchestrator multi-turn input grows with each cached
    # explore tool_response read (~3-5K per explore × up to 8). At 8 turns
    # accumulated input can hit 30-40K. With max-model-len=65536, leaving
    # max_tokens=20000 keeps max_input=45000 which absorbs all 8 explores.
    # Per-call generation rarely exceeds 20K (LCB explorer p99=10350); when
    # the orchestrator wants to write more, the soft-skip path will catch
    # context overflow as a timed_out cache entry. Set 2026-05-02.
      max_tokens: 20000
# 128 client-side asyncio tasks. See gpqa_qwen36_35b_a3b_exp_orch.yaml for
# the server cap math. User-directed 2026-05-02.
  explore:
    - label: default
      model:
        backend: vllm
        model: qwen36-35b-a3b-fp8
      cache_dir: ../analysis/cache/lcb/qwen36_35b_a3b_fp8
      num_explores: 8
num_workers: 128
seed: 42
log_dir: ../analysis/run/lcb/qwen36_35b_a3b_fp8_exp_orch
resume: ../analysis/run/lcb/qwen36_35b_a3b_fp8_exp_orch/run_20260502_053910
