benchmark:
  name: lcb
backend: vllm
explore_model: gptoss-20b
cache_dir: ../analysis/cache/lcb/gptoss20b
num_explores: 8
# num_workers=64 (Gemma uses 256, but gpt-oss DP=2 has lower nominal concurrency
# than Gemma DP=4 so we cap at 64 = 2× the per-replica concurrency). Adjust up
# if observe queue starvation.
num_workers: 64
# explore_timeout=1200s: LCB code-generation tasks have long-tail thinking;
# matches Qwen + Gemma LCB precache budget.
explore_timeout: 1200.0
seed: 42
sampling:
  temperature: 1.0
  top_p: 1.0
  max_tokens: 60000
