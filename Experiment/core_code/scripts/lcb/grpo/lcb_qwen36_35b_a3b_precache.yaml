benchmark:
  name: lcb
explore:
  label: default
  model:
    backend: vllm
    model: qwen36-35b-a3b-fp8
    budget_tokens: 32000
    effort: low
    timeout: 1200.0
    vllm_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      min_p: 0.0
      presence_penalty: 1.5
      repetition_penalty: 1.0
      enable_thinking: true
  # max_tokens=60000: vllm enforces max_input = max-model-len - max_tokens.
  # With max-model-len=65536 (set 2026-05-02), max_tokens=65536 leaves 0
  # input budget which crashes every call. 60000 leaves 5536 input headroom,
  # plenty for precache single-turn inputs (input p50 = 570 tokens, p99
  # likely < 2K). Real generation observed on LCB: max=13754, p99=10350,
  # so 60K is wildly above need; this knob is set near-ceiling on purpose
  # to match the matched-budget design (see serve_qwen36_35b_a3b_dp4.sh).
      max_tokens: 60000
  cache_dir: ../analysis/cache/lcb/qwen36_35b_a3b_fp8
  num_explores: 8
num_workers: 256
seed: 42
