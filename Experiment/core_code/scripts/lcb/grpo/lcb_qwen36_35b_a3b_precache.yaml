benchmark:
  name: lcb
backend: vllm
# Explorer = orchestrator: same Qwen3.6-35B-A3B-FP8 alias served as a single
# DP=4 endpoint on :8000 (vllm internally fans out to 4 GPU workers). See
# hle_qwen36_35b_a3b_precache.yaml for the `_exp_orch` arm rationale.
explore_model: qwen36-35b-a3b-fp8
cache_dir: ../analysis/cache/lcb/qwen36_35b_a3b_fp8
num_explores: 8
# 128 client-side asyncio tasks. Under DP=4 vllm queues to ~5-6 in-flight per
# worker (KV-cache bound for 128K-context); the rest queue. Same value the
# 3-replica era used (then ~43 per replica via client-side round-robin).
num_workers: 128
seed: 42
# MUST match lcb_qwen36_35b_a3b_exp_orch.yaml.sampling exactly.
sampling:
  temperature: 1.0
  top_p: 0.95
  top_k: 20
  min_p: 0.0
  presence_penalty: 1.5
  repetition_penalty: 1.0
  enable_thinking: true
  # max_tokens=65536: code-generation explores need long output budget.
  # Mirrors the LCB orchestrator yaml; the orchestrator was bumped 32K→65K
  # because 14/175 LCB questions hit the 32K cap on long-code problems
  # (run_20260501_042951). Same bump applied to the explorer for parity.
  max_tokens: 65536
