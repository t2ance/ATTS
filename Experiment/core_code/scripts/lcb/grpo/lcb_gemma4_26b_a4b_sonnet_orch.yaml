benchmark:
  name: lcb
  # LCB grades via lcb_runner test execution; LCBSpec rejects judge via
  # extra: forbid. No judge block, by design.
method:
  name: tts-agent
  backend:
    name: vllm
  # Variant B: Sonnet-cached explorer + Gemma orchestrator.
  explore_model: claude-sonnet-4-6
  orchestrator_model: gemma4-26b-a4b-it
  cache_dir: ../analysis/cache/lcb/sonnet
  # cache_only hardcoded True at TTSAgentMethod (methods/registry.py:94).
  no_integrate: true
  num_explores: 8
  sampling:
    temperature: 1.0
    top_p: 0.95
    top_k: 64
    enable_thinking: true
    # max_tokens=20000 (NOT 32768): LCB orchestrator headroom convention from
    # exp_orch — leaves room for accumulated multi-turn explore tool_response
    # inputs (LCB explores can be longer than HLE/GPQA).
    max_tokens: 20000
num: 175
# num_workers=16: Gemma DP=1 KV pool conservative default.
num_workers: 16
seed: 42
log_dir: ../analysis/run/lcb/gemma4_26b_a4b_it_sonnet_orch
