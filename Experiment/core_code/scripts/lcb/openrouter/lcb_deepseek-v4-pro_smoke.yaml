# LCB smoke for deepseek/deepseek-v4-pro via OpenRouter (paid).
# Pre-flight: num=2 questions × n_explore=2 = 4 explores total. Goal: validate
# end-to-end ATTS works (tool_call routing, structured output, lcb_runner
# grading) BEFORE committing to full 800-explore precache + 100-question eval.
# Cache_dir is SEPARATE from production to avoid pollution.
benchmark:
  name: lcb
method:
  name: tts-agent
  backend:
    name: openrouter
    # timeout: 1200.0 — explicit per user 2026-05-04 directive "Timeout 写成
    #   1200 秒"; matches BackendConfig default in methods/specs.py:66.
    timeout: 1200.0
    # max_output_tokens: 384000 — explicit per user 2026-05-04 directive
    #   "Max Token 设成 384k"; matches OpenRouter-reported max_completion_tokens
    #   for deepseek/deepseek-v4-pro. Default is None → SDK uses provider
    #   cap; making explicit prevents drift if upstream spec changes.
    max_output_tokens: 384000
    effort: low
  explore_model: deepseek/deepseek-v4-pro
  orchestrator_model: deepseek/deepseek-v4-pro
  cache_dir: ../analysis/cache/lcb/openrouter_deepseek-v4-pro_smoke
  no_integrate: true
  num_explores: 2
num: 2
num_workers: 2
seed: 42
log_dir: ../analysis/run/lcb/openrouter_deepseek-v4-pro_smoke
