benchmark:
  name: rbenchv
  # Upstream catagory field uses singular "Game", not "Games" (the n=275
  # column header in main.tex is a paper-side stylization). Verified
  # 2026-04-29 via dataset Counter on the full split.
  category: Game
  judge:
    model: claude-haiku-4-5-20251001
    backend: claude
explore:
  label: default
  model:
    backend: claude
    model: claude-sonnet-4-6
    budget_tokens: 32000
    effort: low
    timeout: 1200.0
  cache_dir: ../analysis/cache/rbenchv/sonnet
  num_explores: 8
num_workers: 1
seed: 42
