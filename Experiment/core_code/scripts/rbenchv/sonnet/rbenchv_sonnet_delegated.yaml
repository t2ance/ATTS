benchmark:
  name: rbenchv
  judge:
    model: claude-haiku-4-5-20251001
    backend: claude
method:
  name: tts-agent
  orchestrator_prompt: single
  orchestrator:
    backend: claude
    model: claude-sonnet-4-6
  explore:
  - label: default
    model:
      backend: claude
      model: claude-sonnet-4-6
    cache_dir: ../analysis/cache/rbenchv/sonnet
    num_explores: 8
  integrate:
    model:
      backend: claude
      model: claude-sonnet-4-6
num_workers: 16
seed: 42
log_dir: ../analysis/run/rbenchv/sonnet

# Smoke pin (2026-05-05 explore-cache-owner refactor):
#   cache_only=false enables online-cache mode (preflight skipped, miss -> API
#   -> writeback). num=5 caps blast radius (~$5) for the post-refactor smoke
#   run. Remove these two lines for full-cache production runs.
# cache_only: false
# num: 5
