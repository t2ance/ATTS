benchmark:
  name: rbenchv
  judge:
    model: claude-haiku-4-5-20251001
    backend: claude
method:
  name: tts-agent
  orchestrator_prompt: single
  orchestrator:
    backend: claude
    model: claude-sonnet-4-6
  explore:
    - label: default
      model:
        backend: claude
        model: claude-sonnet-4-6
      cache_dir: ../analysis/cache/rbenchv/sonnet
      num_explores: 8
  integrate:
    model:
      backend: claude
      model: claude-sonnet-4-6
    cache_dir: ../analysis/cache/rbenchv/sonnet
num_workers: 16
seed: 42
log_dir: ../analysis/run/rbenchv/sonnet
