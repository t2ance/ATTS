# R-Bench-V Physics (157 Qs) ATTS evaluation against the explore cache
# generated by rbenchv_gemini-3-flash-preview_precache_physics.yaml. Single-
# variant tts-agent, no_integrate=true (paper main config: orchestrator
# self-synthesizes the final answer over the 8 cached candidates without a
# separate integrate sub-call). Same cache_dir as the precache yaml.
benchmark:
  name: rbenchv
  category: Physics
  judge:
    model: claude-haiku-4-5-20251001
    backend: claude
method:
  name: tts-agent
  orchestrator_prompt: single
  orchestrator:
    backend: openrouter
    model: google/gemini-3-flash-preview
    # Override default (effort=low). Why: matches paper main config for the
    # backbone-ablation row family (Sonnet/Opus/Qwen-FP8 all use effort=low
    # for orchestrator). Coupled with explore.effort=low so this row is the
    # same-effort condition; a high-effort orchestrator row would be a
    # separate experiment (see grok-4.1-fast-high precedent 2026-05-05).
    effort: low
    timeout: 1200.0
    # Override default (null). Why: defensive cap derived from grok HLE
    # 2026-05-05 incident where 9/100 Qs hit an 8000 cap. 16000 absorbs
    # gemini-3-flash reasoning traces with headroom; bounds blast radius.
    max_output_tokens: 65536
  explore:
    - label: default
      model:
        backend: openrouter
        model: google/gemini-3-flash-preview
        effort: high
        timeout: 1200.0
        max_output_tokens: 65536
      cache_dir: ../analysis/cache/rbenchv/openrouter_gemini-3-flash-preview/Physics
      num_explores: 4
  # Paper main config uses no_integrate (the orchestrator role does selection
  # + synthesis in one pass). Keep parity for the row to slot directly into
  # tab:backbone-ablation.
num_workers: 8
seed: 42
log_dir: ../analysis/run/rbenchv/openrouter_gemini-3-flash-preview/Physics
