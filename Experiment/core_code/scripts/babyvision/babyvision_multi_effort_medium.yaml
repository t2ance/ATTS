benchmark:
  name: babyvision
  judge:
    model: claude-haiku-4-5-20251001
    backend: claude
method:
  name: tts-agent
  orchestrator_prompt: multi_model
  orchestrator:
    backend: claude
    model: claude-sonnet-4-6
  explore:
    - label: haiku
      model:
        backend: claude
        model: claude-haiku-4-5-20251001
        effort: medium
      cache_dir: ../analysis/cache/babyvision/haiku
      num_explores: 8
    - label: sonnet
      model:
        backend: claude
        model: claude-sonnet-4-6
        effort: medium
      cache_dir: ../analysis/cache/babyvision/sonnet
      num_explores: 8
    - label: opus
      model:
        backend: claude
        model: claude-opus-4-6
        effort: medium
      cache_dir: ../analysis/cache/babyvision/opus
      num_explores: 2
seed: 42
num_workers: 8
log_dir: ../analysis/run/babyvision/multi_model_effort_medium
