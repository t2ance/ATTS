benchmark:
  name: babyvision
  judge:
    model: claude-haiku-4-5-20251001
    backend: claude
explore:
  label: default
  model:
    backend: vllm
    model: gptoss-20b
    budget_tokens: 32000
    effort: low
    timeout: 1200.0
    vllm_sampling:
  # gpt-oss harmony defaults per OpenAI recipe: T=1.0, top_p=1.0; NO top_k.
      temperature: 1.0
      top_p: 1.0
  # max_tokens=60000: matches HLE/GPQA/LCB gpt-oss precache budget. gpt-oss
  # reasoning chains can be long; 60K fits within max-model-len=131072.
      max_tokens: 60000
  cache_dir: ../analysis/cache/babyvision/gptoss20b
  num_explores: 8
num_workers: 64
seed: 42
