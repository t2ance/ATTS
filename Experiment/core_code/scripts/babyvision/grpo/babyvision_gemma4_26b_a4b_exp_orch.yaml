benchmark:
  name: babyvision
  judge:
    model: gemma4-26b-a4b-it
    backend: vllm
    vllm_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 64
      enable_thinking: true
      max_tokens: 1024
method:
  name: tts-agent
  orchestrator_prompt: single
  orchestrator:
    backend: vllm
    model: gemma4-26b-a4b-it
    vllm_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 64
      enable_thinking: true
      max_tokens: 20000
  explore:
    - label: default
      model:
        backend: vllm
        model: gemma4-26b-a4b-it
      cache_dir: ../analysis/cache/babyvision/gemma4_26b_a4b_it
      num_explores: 8
num_workers: 128
seed: 42
log_dir: ../analysis/run/babyvision/gemma4_26b_a4b_it_gemma_exp_orch
