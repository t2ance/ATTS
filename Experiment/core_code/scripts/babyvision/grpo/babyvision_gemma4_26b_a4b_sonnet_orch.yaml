benchmark:
  name: babyvision
  # Judge = Gemma-4 (matches exp_orch). BV judge fires only on blank-answer
  # items; choice items use string match A-E.
  judge:
    name: vllm
    model: gemma4-26b-a4b-it
    sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 64
      enable_thinking: true
      max_tokens: 1024
method:
  name: tts-agent
  backend:
    name: vllm
  # Variant B: Sonnet-cached explorer + Gemma orchestrator.
  explore_model: claude-sonnet-4-6
  orchestrator_model: gemma4-26b-a4b-it
  cache_dir: ../analysis/cache/babyvision/sonnet
  # cache_only hardcoded True at TTSAgentMethod (methods/registry.py:94).
  no_integrate: true
  num_explores: 8
  sampling:
    temperature: 1.0
    top_p: 0.95
    top_k: 64
    # enable_thinking=false (override default true; 2026-05-03):
    # Variant B is Sonnet-cached aggregator — thinking-on caused 28% empty
    # predicted_answer on HLE 100Q (archived run_20260503_051610). Disabling
    # restores the explorer-thinks / orchestrator-aggregates split. BV
    # multimodal cache reads still flow image features via tool_response
    # text; orchestrator's aggregation does not need thinking to vote.
    # Compare new run Acc to archived thinking-on baseline at
    # analysis/archive/gemma_sonnet_orch_thinking_on_2026-05-03/.
    enable_thinking: false
    # max_tokens=20000: matches BV exp_orch (BV multimodal has shorter outputs
    # than HLE; 20000 is the established headroom).
    max_tokens: 20000
num: 388
# num_workers=16: Gemma DP=1 KV pool conservative default.
num_workers: 16
seed: 42
log_dir: ../analysis/run/babyvision/gemma4_26b_a4b_it_sonnet_orch
