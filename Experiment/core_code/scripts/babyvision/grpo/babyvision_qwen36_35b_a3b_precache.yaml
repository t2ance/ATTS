benchmark:
  name: babyvision
  judge:
    name: claude
    model: claude-haiku-4-5-20251001
backend: vllm
# Explorer = orchestrator: same Qwen3.6-35B-A3B-FP8 alias on :8000-:8002.
# See hle_qwen36_35b_a3b_precache.yaml for the `_exp_orch` arm rationale.
explore_model: qwen36-35b-a3b-fp8
cache_dir: ../analysis/cache/babyvision/qwen36_35b_a3b_fp8
num_explores: 8
# 128 across 3 replicas (~43 in-flight each). BabyVision is image-conditioned;
# vLLM image preprocessing adds CPU overhead per request, but throughput is
# still compute-bound on 35B-A3B FP8 decode, not preprocessing.
num_workers: 128
seed: 42
# MUST match babyvision_qwen36_35b_a3b_exp_orch.yaml.sampling exactly.
sampling:
  temperature: 1.0
  top_p: 0.95
  top_k: 20
  min_p: 0.0
  presence_penalty: 1.5
  repetition_penalty: 1.0
  enable_thinking: true
  # max_tokens=65536: image-conditioned BV prompts trigger longer think-blocks;
  # mirrors the orchestrator yaml that was bumped 32K→65K for the same reason.
  max_tokens: 65536
