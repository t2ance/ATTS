### Model
model_name_or_path: Qwen/Qwen2.5-7B-Instruct
trust_remote_code: true

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 64
lora_alpha: 128
lora_target: all

### Dataset
dataset_dir: /data3/peijia/dr-claw/Explain/Experiment/core_code/training
dataset: atts_sft
template: qwen
cutoff_len: 16384

### Output
output_dir: /data3/peijia/dr-claw/Explain/Experiment/core_code/checkpoints/sft
logging_steps: 1
save_steps: 500
overwrite_output_dir: true

### Train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
gradient_checkpointing: true

### Logging
report_to: wandb
run_name: atts-sft

### Eval
val_size: 0.1
per_device_eval_batch_size: 1
eval_strategy: epoch
