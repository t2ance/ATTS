hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath:
  - pkg://verl.trainer.config
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - algorithm.adv_estimator=grpo
    - data.train_batch_size=8
    - data.max_prompt_length=4096
    - data.max_response_length=4096
    - data.filter_overlong_prompts=True
    - data.truncation=error
    - data.return_raw_chat=True
    - data.train_files=/data3/peijia/dr-claw/Explain/Experiment/core_code/training_data/grpo/train.parquet
    - data.val_files=/data3/peijia/dr-claw/Explain/Experiment/core_code/training_data/grpo/val.parquet
    - actor_rollout_ref.model.path=Qwen/Qwen3-1.7B
    - actor_rollout_ref.model.enable_gradient_checkpointing=True
    - actor_rollout_ref.actor.optim.lr=1e-6
    - actor_rollout_ref.actor.ppo_mini_batch_size=8
    - actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=2
    - actor_rollout_ref.actor.use_kl_loss=True
    - actor_rollout_ref.actor.kl_loss_coef=0.001
    - actor_rollout_ref.actor.kl_loss_type=low_var_kl
    - actor_rollout_ref.actor.fsdp_config.param_offload=False
    - actor_rollout_ref.actor.fsdp_config.optimizer_offload=False
    - actor_rollout_ref.rollout.name=sglang
    - actor_rollout_ref.rollout.mode=async
    - actor_rollout_ref.rollout.response_length=4096
    - actor_rollout_ref.rollout.gpu_memory_utilization=0.4
    - actor_rollout_ref.rollout.tensor_model_parallel_size=1
    - actor_rollout_ref.rollout.n=2
    - actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=2
    - actor_rollout_ref.rollout.multi_turn.enable=True
    - actor_rollout_ref.rollout.multi_turn.max_assistant_turns=5
    - actor_rollout_ref.rollout.multi_turn.max_tool_response_length=2048
    - actor_rollout_ref.rollout.multi_turn.tool_response_truncate_side=right
    - actor_rollout_ref.rollout.multi_turn.format=hermes
    - actor_rollout_ref.rollout.multi_turn.tool_config_path=/data3/peijia/dr-claw/Explain/Experiment/core_code/training/grpo/tool_config.yaml
    - actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=2
    - actor_rollout_ref.ref.fsdp_config.param_offload=False
    - algorithm.use_kl_in_reward=False
    - custom_reward_function.path=/data3/peijia/dr-claw/Explain/Experiment/core_code/training/grpo/reward_fn.py
    - custom_reward_function.name=compute_score
    - trainer.critic_warmup=0
    - trainer.logger=["console"]
    - trainer.project_name=atts-grpo-smoke
    - trainer.experiment_name=smoke-1.7b
    - trainer.n_gpus_per_node=1
    - trainer.nnodes=1
    - trainer.save_freq=100
    - trainer.test_freq=100
    - trainer.val_before_train=False
    - trainer.total_epochs=1
  job:
    name: main_ppo
    chdir: null
    override_dirname: actor_rollout_ref.actor.fsdp_config.optimizer_offload=False,actor_rollout_ref.actor.fsdp_config.param_offload=False,actor_rollout_ref.actor.kl_loss_coef=0.001,actor_rollout_ref.actor.kl_loss_type=low_var_kl,actor_rollout_ref.actor.optim.lr=1e-6,actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=2,actor_rollout_ref.actor.ppo_mini_batch_size=8,actor_rollout_ref.actor.use_kl_loss=True,actor_rollout_ref.model.enable_gradient_checkpointing=True,actor_rollout_ref.model.path=Qwen/Qwen3-1.7B,actor_rollout_ref.ref.fsdp_config.param_offload=False,actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=2,actor_rollout_ref.rollout.gpu_memory_utilization=0.4,actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=2,actor_rollout_ref.rollout.mode=async,actor_rollout_ref.rollout.multi_turn.enable=True,actor_rollout_ref.rollout.multi_turn.format=hermes,actor_rollout_ref.rollout.multi_turn.max_assistant_turns=5,actor_rollout_ref.rollout.multi_turn.max_tool_response_length=2048,actor_rollout_ref.rollout.multi_turn.tool_config_path=/data3/peijia/dr-claw/Explain/Experiment/core_code/training/grpo/tool_config.yaml,actor_rollout_ref.rollout.multi_turn.tool_response_truncate_side=right,actor_rollout_ref.rollout.n=2,actor_rollout_ref.rollout.name=sglang,actor_rollout_ref.rollout.response_length=4096,actor_rollout_ref.rollout.tensor_model_parallel_size=1,algorithm.adv_estimator=grpo,algorithm.use_kl_in_reward=False,custom_reward_function.name=compute_score,custom_reward_function.path=/data3/peijia/dr-claw/Explain/Experiment/core_code/training/grpo/reward_fn.py,data.filter_overlong_prompts=True,data.max_prompt_length=4096,data.max_response_length=4096,data.return_raw_chat=True,data.train_batch_size=8,data.train_files=/data3/peijia/dr-claw/Explain/Experiment/core_code/training_data/grpo/train.parquet,data.truncation=error,data.val_files=/data3/peijia/dr-claw/Explain/Experiment/core_code/training_data/grpo/val.parquet,trainer.critic_warmup=0,trainer.experiment_name=smoke-1.7b,trainer.logger=["console"],trainer.n_gpus_per_node=1,trainer.nnodes=1,trainer.project_name=atts-grpo-smoke,trainer.save_freq=100,trainer.test_freq=100,trainer.total_epochs=1,trainer.val_before_train=False
    id: ???
    num: ???
    config_name: grpo_config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /data3/peijia/dr-claw/Explain/Experiment/core_code
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /data3/peijia/dr-claw/Explain/Experiment/core_code/training/grpo
      schema: file
      provider: main
    - path: verl.trainer.config
      schema: pkg
      provider: hydra.searchpath in main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /data3/peijia/dr-claw/Explain/Experiment/core_code/outputs/2026-04-08/08-33-18
    choices:
      algorithm@algorithm.rollout_correction: rollout_correction
      reward_model: dp_reward_loop
      critic: dp_critic
      critic/../engine@critic.model.fsdp_config: fsdp
      critic/../optim@critic.optim: fsdp
      model@actor_rollout_ref.model: hf_model
      rollout@actor_rollout_ref.rollout: rollout
      ref@actor_rollout_ref.ref: dp_ref
      ref/../engine@actor_rollout_ref.ref.fsdp_config: fsdp
      data: legacy_data
      actor@actor_rollout_ref.actor: dp_actor
      actor/../engine@actor_rollout_ref.actor.fsdp_config: fsdp
      actor/../optim@actor_rollout_ref.actor.optim: fsdp
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
