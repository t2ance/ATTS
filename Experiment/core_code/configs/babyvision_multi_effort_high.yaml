# configs/babyvision_multi_effort_high.yaml
# Replaces args of scripts/babyvision/multi_model_run_effort_high.sh
benchmark: babyvision
backend: claude
explore_model: claude-sonnet-4-6
method: tts-agent-multi
orchestrator_model: claude-sonnet-4-6
# integrate_model is auto-aliased from orchestrator_model by async_main for tts-agent-multi

cache_dirs:
  haiku:  ../analysis/cache/babyvision/haiku
  sonnet: ../analysis/cache/babyvision/sonnet
  opus:   ../analysis/cache/babyvision/opus
model_budgets:
  haiku:  8
  sonnet: 8
  opus:   2

exploration_effort: high
no_integrate: true

seed: 42
num_explores: 16
num_workers: 8
log_dir: ../analysis/run/babyvision/multi_model_effort_high
