apiVersion: batch/v1
kind: Job
metadata:
  name: peijia-grpo-8b-sft-2gpu
  namespace: ecepxie
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values: ["node-2-4.sdsc.optiputer.net"]
              - key: nvidia.com/gpu.product
                operator: In
                values: ["NVIDIA-A100-SXM4-80GB"]
      containers:
      - name: train
        image: vllm/vllm-openai:v0.17.1
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -ex
          ulimit -n 65535

          # --- phase 1: env delta on top of vllm/vllm-openai:v0.17.1 ---
          # Base image already has: torch 2.10, vllm 0.17.1, CUDA 12, flash-attn.
          # Installing only the verl-specific delta to minimize startup time.
          pip install --no-cache-dir \
              verl==0.7.1 \
              liger-kernel==0.7.0 \
              torchdata==0.11.0 \
              "ray[default]==2.54.0" \
              codetiming==1.4.0 \
              dill==0.3.8 \
              hydra-core \
              weave \
              hf_transfer
          export HF_HUB_ENABLE_HF_TRANSFER=1

          # --- phase 2: pull public code + model ---
          git clone --depth=1 https://github.com/t2ance/ATTS.git /opt/code
          cd /opt/code/Experiment/core_code
          export PROJECT_DIR=$PWD
          export PYTHONPATH="$PROJECT_DIR/training/grpo/bootstrap:$PROJECT_DIR"
          echo "COMMIT=$(cd /opt/code && git rev-parse --short HEAD)"

          MODEL_DIR="$PROJECT_DIR/checkpoints/sft_qwen3_8b_merged"
          mkdir -p "$MODEL_DIR"
          hf download t2ance/sft_qwen3_8b_merged --local-dir "$MODEL_DIR"

          CKPT_DIR="$PROJECT_DIR/checkpoints/atts-grpo/8b-sft-2gpu-bs96"
          mkdir -p "$CKPT_DIR"
          export CHECKPOINT_REPO_ID="t2ance/atts-grpo-8b-sft-2gpu-bs96"

          # --- phase 3: judge vLLM server on GPU 2 ---
          CUDA_VISIBLE_DEVICES=2 vllm serve Qwen/Qwen3-8B \
              --host 127.0.0.1 --port 8000 \
              --tensor-parallel-size 1 \
              --gpu-memory-utilization 0.5 \
              --max-model-len 16384 \
              --dtype bfloat16 \
              --enable-prefix-caching \
              --no-enable-log-requests \
              > /tmp/judge.log 2>&1 &
          JUDGE_PID=$!
          echo "judge PID=$JUDGE_PID"
          for i in $(seq 1 120); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then
              echo "judge ready after ${i} × 5s"
              break
            fi
            sleep 5
          done
          curl -sf http://127.0.0.1:8000/health || { echo "judge failed to start"; tail -50 /tmp/judge.log; exit 1; }

          # --- phase 4: trainer on GPUs 0,1 ---
          export CUDA_VISIBLE_DEVICES=0,1
          export RAY_ADDRESS=local
          export RAY_memory_monitor_refresh_ms=0
          export PYTORCH_ALLOC_CONF=expandable_segments:True
          export WANDB_INIT_TIMEOUT=300

          RESUME_ARGS=(trainer.default_local_dir="$CKPT_DIR")
          if [[ -f "$CKPT_DIR/latest_checkpointed_iteration.txt" ]]; then
            LAST_STEP="$(<"$CKPT_DIR/latest_checkpointed_iteration.txt")"
            if [[ -n "$LAST_STEP" && -d "$CKPT_DIR/global_step_$LAST_STEP" ]]; then
              RESUME_ARGS+=(
                trainer.resume_mode=resume_path
                trainer.resume_from_path="$CKPT_DIR/global_step_$LAST_STEP"
              )
            fi
          fi

          python3 -u -m verl.trainer.main_ppo \
              --config-path="$PROJECT_DIR/training/grpo" \
              --config-name='grpo_config' \
              algorithm.adv_estimator=grpo \
              data.train_batch_size=32 \
              data.max_prompt_length=8192 \
              data.max_response_length=16384 \
              data.filter_overlong_prompts=True \
              data.truncation=error \
              data.return_raw_chat=True \
              data.train_files="$PROJECT_DIR/training_data/grpo/train.parquet" \
              data.val_files="$PROJECT_DIR/training_data/grpo/val.parquet" \
              actor_rollout_ref.model.path="$MODEL_DIR" \
              actor_rollout_ref.model.enable_gradient_checkpointing=True \
              ++actor_rollout_ref.model.use_liger=True \
              actor_rollout_ref.actor.optim.lr=1e-6 \
              actor_rollout_ref.actor.ppo_mini_batch_size=16 \
              actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=1 \
              ++actor_rollout_ref.actor.use_dynamic_bsz=True \
              ++actor_rollout_ref.actor.ppo_max_token_len_per_gpu=24576 \
              ++actor_rollout_ref.actor.entropy_from_logits_with_chunking=True \
              actor_rollout_ref.actor.use_kl_loss=True \
              actor_rollout_ref.actor.kl_loss_coef=0.001 \
              actor_rollout_ref.actor.kl_loss_type=low_var_kl \
              actor_rollout_ref.actor.fsdp_config.param_offload=False \
              actor_rollout_ref.actor.fsdp_config.optimizer_offload=False \
              actor_rollout_ref.actor.fsdp_config.model_dtype=bfloat16 \
              actor_rollout_ref.actor.fsdp_config.reshard_after_forward=True \
              ++actor_rollout_ref.actor.fsdp_config.forward_prefetch=True \
              actor_rollout_ref.actor.fsdp_config.fsdp_size=-1 \
              actor_rollout_ref.rollout.name=vllm \
              actor_rollout_ref.rollout.response_length=16384 \
              actor_rollout_ref.rollout.gpu_memory_utilization=0.55 \
              actor_rollout_ref.rollout.checkpoint_engine.update_weights_bucket_megabytes=4096 \
              actor_rollout_ref.rollout.tensor_model_parallel_size=1 \
              actor_rollout_ref.rollout.max_model_len=24576 \
              actor_rollout_ref.rollout.n=8 \
              actor_rollout_ref.rollout.temperature=0.7 \
              actor_rollout_ref.rollout.val_kwargs.temperature=0.0 \
              actor_rollout_ref.rollout.val_kwargs.do_sample=False \
              actor_rollout_ref.rollout.val_kwargs.n=4 \
              actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=1 \
              actor_rollout_ref.rollout.multi_turn.enable=True \
              actor_rollout_ref.rollout.multi_turn.max_assistant_turns=9 \
              actor_rollout_ref.rollout.multi_turn.max_tool_response_length=2048 \
              actor_rollout_ref.rollout.multi_turn.tool_response_truncate_side=right \
              actor_rollout_ref.rollout.multi_turn.format=hermes \
              actor_rollout_ref.rollout.multi_turn.tool_config_path="$PROJECT_DIR/training/grpo/tool_config.yaml" \
              actor_rollout_ref.rollout.agent.num_workers=4 \
              reward.num_workers=4 \
              actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=1 \
              actor_rollout_ref.ref.fsdp_config.param_offload=False \
              actor_rollout_ref.ref.fsdp_config.model_dtype=bfloat16 \
              ++actor_rollout_ref.ref.fsdp_config.forward_prefetch=True \
              algorithm.use_kl_in_reward=False \
              custom_reward_function.path="$PROJECT_DIR/training/grpo/reward_fn.py" \
              custom_reward_function.name=compute_score \
              actor_rollout_ref.rollout.trace.backend=weave \
              actor_rollout_ref.rollout.trace.token2text=True \
              actor_rollout_ref.rollout.trace.max_samples_per_step_per_worker=2 \
              trainer.max_actor_ckpt_to_keep=3 \
              trainer.critic_warmup=0 \
              trainer.logger='["console","wandb"]' \
              trainer.project_name=atts-grpo \
              trainer.experiment_name=8b-sft-2gpu-bs96-nrp \
              trainer.n_gpus_per_node=2 \
              trainer.nnodes=1 \
              trainer.save_freq=5 \
              trainer.test_freq=5 \
              trainer.val_before_train=True \
              trainer.total_epochs=15 \
              "${RESUME_ARGS[@]}" \
              2>&1 | tee /tmp/train.log
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: peijia-huggingface
              key: HF_TOKEN
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: peijia-wandb
              key: WANDB_API_KEY
        - name: HF_HUB_ENABLE_HF_TRANSFER
          value: "1"
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
        resources:
          requests:
            cpu: "16"
            memory: 120Gi
            ephemeral-storage: 200Gi
            nvidia.com/a100: "3"
          limits:
            cpu: "16"
            memory: 120Gi
            ephemeral-storage: 200Gi
            nvidia.com/a100: "3"
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 32Gi
